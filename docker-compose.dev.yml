version: "3.9"

# ── AgriWeather AI — Development Compose ─────────────────────────────────────
# Usage:
#   make dev.setup   (first time)
#   make dev.start

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agriweather_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agriweather
      POSTGRES_USER: agriweather
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agriweather_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriweather -d agriweather"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: agriweather_app
    restart: unless-stopped
    command: sleep infinity   # started by make dev.start → npm run dev
    tty: true
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      WEATHER_AI_API_KEY: ${WEATHER_AI_API_KEY}
      DATABASE_URL: postgresql://agriweather:${POSTGRES_PASSWORD:-agriweather_dev}@postgres:5432/agriweather
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - node_modules_cache:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  # ── pgweb (DB browser UI) ────────────────────────────────────────────────────
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: agriweather_pgweb
    restart: unless-stopped
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    environment:
      PGWEB_DATABASE_URL: postgresql://agriweather:${POSTGRES_PASSWORD:-agriweather_dev}@postgres:5432/agriweather?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  node_modules_cache:
    driver: local
